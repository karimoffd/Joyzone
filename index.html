 <!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Joyzone registration screen with a premium reusable GSAP slider."
    />
    <title>Joyzone | Ro'yxatdan o'tish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              joyBlue: "#294A6D",
              joyDeep: "#12283F",
              joyCream: "#F6F1EE",
              joyOrange: "#E46630"
            },
            boxShadow: {
              panel: "0 28px 80px rgba(11, 24, 38, 0.42)"
            },
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Arial", "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="root">
      <div class="joy-loader joy-loader-boot" role="status" aria-live="polite">
        <div class="joy-loader-map" aria-hidden="true">
          <span class="loader-line loader-line-1"></span>
          <span class="loader-line loader-line-2"></span>
          <span class="loader-line loader-line-3"></span>
          <span class="loader-line loader-line-4"></span>
          <span class="loader-line loader-line-5"></span>
          <span class="loader-line loader-line-6"></span>
        </div>
        <div class="joy-loader-content">
          <div class="joy-loader-brand">
            <span>JOY</span>
            <span class="joy-loader-pin"></span>
            <span>ZONE</span>
          </div>
          <div class="joy-loader-copy">Joylar tayyorlanmoqda</div>
          <div class="joy-loader-progress"><span></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
